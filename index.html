<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoFi | Summits & Workshops for AI Product Teams</title>

  <link rel="icon" type="image/png" href="/favicon.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    a { text-decoration: none; color: inherit; }

    :root {
      --bg: #ffffff;
      --text: #20023C;
      --text-muted: #8E7C9A;
      --accent: #0074D4;
      --border: rgba(0,0,0,0.08);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.6;
    }

    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 40px; }

    /* ── BUTTONS ── */
    .btn-solid {
      font-size: 16px;
      font-weight: 600;
      padding: 12px 28px;
      background: #0074D4;
      color: #ffffff;
      border: 1px solid #0074D4;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      gap: 0;
      transition: opacity 0.2s;
      cursor: pointer;
    }
    .btn-solid::after {
      content: '→';
      display: inline-block;
      max-width: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-width 0.2s ease, opacity 0.2s ease, margin-left 0.2s ease;
      margin-left: 0;
    }
    .btn-solid:hover::after { max-width: 20px; opacity: 1; margin-left: 6px; }
    .btn-solid:hover { opacity: 0.88; }

    /* ── HERO ── */
    .hero { transition: background 0.6s; }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 40px 80px;
      position: relative;
      overflow: hidden;
      background: #0a0e2e;
    }

    /* Shooting stars */
    .shooting-star {
      position: absolute;
      width: 140px;
      height: 1.5px;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, #ffffff 100%);
      border-radius: 2px;
      transform: rotate(-35deg);
      opacity: 0;
      z-index: 1;
      pointer-events: none;
      animation: shoot var(--dur) ease-out forwards;
    }
    @keyframes shoot {
      0%   { opacity: 0; transform: rotate(-35deg) translateX(-60px); }
      8%   { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; transform: rotate(-35deg) translateX(500px); }
    }

    /* Stars */
    .stars { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #ffffff;
      animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
      animation-delay: var(--delay, 0s);
    }
    @keyframes twinkle {
      from { opacity: var(--op-min, 0.2); }
      to   { opacity: var(--op-max, 0.9); }
    }

    .hero-glow {
      position: absolute;
      top: 50%; left: 50%;
      width: clamp(400px, 60vw, 800px);
      height: clamp(400px, 60vw, 800px);
      background: linear-gradient(135deg, rgba(20,60,200,0.4) 0%, rgba(70,30,180,0.35) 50%, rgba(0,100,255,0.25) 100%);
      filter: blur(80px);
      border-radius: 50%;
      z-index: 1;
      transform: translate(-50%, -50%);
      animation: glide 25s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes glide {
      from { transform: translate(-52%, -48%) rotate(0deg) scale(1); }
      to   { transform: translate(-48%, -52%) rotate(8deg) scale(1.08); }
    }

    /* Clouds */
    .cloud { position: absolute; pointer-events: none; z-index: 0; opacity: 0.12; }

    /* Moon / Sun */
    .moon {
      position: absolute;
      top: 10%;
      right: 12%;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #fffbe6;
      box-shadow: 0 0 40px 12px rgba(255,245,180,0.25), 0 0 80px 30px rgba(255,230,100,0.1);
      z-index: 1;
      overflow: hidden;
      cursor: pointer;
      transition: background 0.6s, box-shadow 0.6s;
    }
    .moon::after {
      content: '';
      position: absolute;
      top: 6px;
      left: 14px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #0a1030;
      transition: opacity 0.6s, background 0.6s;
    }
    /* Sun state */
    .moon.is-sun {
      background: #FFD94A;
      box-shadow: 0 0 40px 16px rgba(255,210,50,0.5), 0 0 100px 40px rgba(255,180,0,0.25);
    }
    .moon.is-sun::after { opacity: 0; }

    /* Light mode */
    .hero.light-mode { background: linear-gradient(180deg, #E7F7FF 0%, #ffffff 100%); }
    .hero.light-mode .stars { opacity: 0; transition: opacity 0.6s; }
    .hero.light-mode .cloud { opacity: 0.55; }
    .hero.light-mode .hero-title { color: #20023C; }
    .hero.light-mode .hero-eyebrow { color: rgba(32,2,60,0.6); }
    .hero.light-mode .hero-sub { color: rgba(32,2,60,0.7); }
    .hero.light-mode .hero-event-label { color: rgba(32,2,60,0.6); }
    .hero.light-mode .hero-footer { color: rgba(32,2,60,0.4); }
    .hero.light-mode .hero-footer a { color: rgba(32,2,60,0.55); border-color: rgba(32,2,60,0.2); }
    .hero.light-mode .hero-footer a:hover { color: #20023C; border-color: rgba(32,2,60,0.5); }
    .hero.light-mode .hero-signin { color: rgba(32,2,60,0.7); border-color: rgba(32,2,60,0.25); }
    .hero.light-mode .hero-signin:hover { color: #20023C; border-color: rgba(32,2,60,0.6); }
    .hero.light-mode .hero-logo { filter: none; }
    .hero.light-mode .logo-item img { filter: brightness(0) opacity(0.65); }
    .hero.light-mode .logos-label { color: rgba(32,2,60,0.45); }
    .hero.light-mode .btn-solid { background: #0074D4; border-color: #0074D4; color: #fff; }
    .cloud-body { background: #ffffff; border-radius: 50px; position: relative; }
    .cloud-body::before, .cloud-body::after { content: ''; position: absolute; background: #ffffff; border-radius: 50%; }
    @keyframes cloud-drift { from { transform: translateX(0); } to { transform: translateX(calc(100vw + 400px)); } }

    .cloud-1 .cloud-body { width: 200px; height: 50px; top: 30px; }
    .cloud-1 .cloud-body::before { width: 90px; height: 90px; top: -44px; left: 30px; }
    .cloud-1 .cloud-body::after  { width: 60px; height: 60px; top: -28px; left: 100px; }
    .cloud-1  { top: 12%; left: -220px; animation: cloud-drift 70s linear infinite; }
    .cloud-1b { top: 12%; left: -220px; animation: cloud-drift 70s linear infinite; animation-delay: -35s; }

    .cloud-2 .cloud-body,
    .cloud-2b .cloud-body { width: 140px; height: 38px; top: 22px; }
    .cloud-2 .cloud-body::before,
    .cloud-2b .cloud-body::before { width: 64px; height: 64px; top: -32px; left: 18px; }
    .cloud-2 .cloud-body::after,
    .cloud-2b .cloud-body::after  { width: 48px; height: 48px; top: -22px; left: 72px; }
    .cloud-2  { top: 35%; left: -160px; animation: cloud-drift 95s linear infinite; animation-delay: -10s; }
    .cloud-2b { top: 35%; left: -160px; animation: cloud-drift 95s linear infinite; animation-delay: -57s; }

    .cloud-3 .cloud-body,
    .cloud-3b .cloud-body { width: 260px; height: 60px; top: 38px; }
    .cloud-3 .cloud-body::before,
    .cloud-3b .cloud-body::before { width: 110px; height: 110px; top: -56px; left: 40px; }
    .cloud-3 .cloud-body::after,
    .cloud-3b .cloud-body::after  { width: 80px; height: 80px; top: -38px; left: 140px; }
    .cloud-3  { top: 65%; left: -280px; animation: cloud-drift 110s linear infinite; animation-delay: -20s; }
    .cloud-3b { top: 65%; left: -280px; animation: cloud-drift 110s linear infinite; animation-delay: -75s; }

    .hero-content { position: relative; z-index: 2; max-width: 820px; }

    .hero-eyebrow {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      margin-bottom: 28px;
    }

    .hero-title {
      font-size: clamp(52px, 8vw, 96px);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.04em;
      color: #ffffff;
      margin-bottom: 24px;
    }
    .hero-title em {
      font-style: italic;
      font-weight: 300;
      opacity: 0.82;
    }

    .hero-sub {
      font-size: clamp(17px, 2.5vw, 21px);
      font-weight: 400;
      color: rgba(255,255,255,0.82);
      line-height: 1.65;
      max-width: 600px;
      margin: 0 auto 40px;
    }

    .hero-cta-group { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .hero-event-label { font-size: 13px; color: rgba(255,255,255,0.8); font-weight: 500; }

    /* Logo scroll */
    .logos-wrap {
      width: 100%;
      max-width: 600px;
      margin: 0 auto 0;
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent, black 12%, black 88%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 12%, black 88%, transparent);
    }
    .logos-track {
      display: flex;
      width: max-content;
      animation: scroll-logos 80s linear infinite;
      align-items: center;
      height: 60px;
    }
    @keyframes scroll-logos {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .logo-item {
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-item img {
      height: clamp(72px, 10vw, 104px);
      width: auto;
      filter: brightness(0) invert(1) opacity(0.65);
    }
    .logos-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-top: 80px;
      margin-bottom: 16px;
    }

    .hero-footer {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .hero-footer a {
      color: rgba(255,255,255,0.85);
      font-weight: 600;
      font-size: 12px;
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      transition: border-color 0.2s, color 0.2s;
    }
    .hero-footer a:hover { border-color: rgba(255,255,255,0.6); color: #ffffff; }

    .hero-logo {
      position: absolute;
      top: 24px;
      left: 40px;
      height: 110px;
      width: auto;
      filter: invert(1);
      z-index: 2;
    }
    .hero-signin {
      position: absolute;
      top: 44px;
      right: 40px;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      padding: 8px 20px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      z-index: 2;
      transition: color 0.2s, border-color 0.2s;
    }
    .hero-signin:hover { color: #ffffff; border-color: rgba(255,255,255,0.7); }

    /* Mobile */
    @media (max-width: 768px) {
      .wrap { padding: 0 20px; }
      .hero { padding: 100px 20px 60px; }
    }
  </style>
</head>
<body>

<!-- HERO -->
<section class="hero" id="top">
  <img src="cofi-logo-instagram.png" class="hero-logo" alt="CoFi">
  <a href="https://members.cofi.so/" class="hero-signin">Sign in</a>
  <div class="stars" id="stars"></div>
  <div class="moon"></div>
  <div class="cloud cloud-1"><div class="cloud-body"></div></div>
  <div class="cloud cloud-1b"><div class="cloud-body"></div></div>
  <div class="cloud cloud-2"><div class="cloud-body"></div></div>
  <div class="cloud cloud-2b"><div class="cloud-body"></div></div>
  <div class="cloud cloud-3"><div class="cloud-body"></div></div>
  <div class="cloud cloud-3b"><div class="cloud-body"></div></div>

  <div class="hero-content">
<span class="hero-eyebrow">Summits & Workshops</span>
    <h1 class="hero-title">
      Built<br>
      <em>for</em><br>

    <div class="hero-cta-group">
      <a href="https://aipmsummit.com" class="btn-solid">AI PM Summit</a>
      <span class="hero-event-label">April 22, 2026 · Live Online</span>
    </div>

    <p class="logos-label">Trusted by</p>
    <div class="logos-wrap">
      <div class="logos-track">
        <!-- first set -->
        <div class="logo-item"><img src="images/airbnb-logo.webp" alt="Airbnb"></div>
        <div class="logo-item"><img src="images/amazon-logo.webp" alt="Amazon"></div>
        <div class="logo-item"><img src="images/disney-logo.webp" alt="Disney"></div>
        <div class="logo-item"><img src="images/google-logo.webp" alt="Google"></div>
        <div class="logo-item"><img src="images/meta-logo.webp" alt="Meta"></div>
        <div class="logo-item"><img src="images/microsoft-logo.webp" alt="Microsoft"></div>
        <div class="logo-item"><img src="images/spotify-logo.webp" alt="Spotify"></div>
        <div class="logo-item"><img src="images/stripe-logo.webp" alt="Stripe"></div>
        <!-- duplicate for seamless loop -->
        <div class="logo-item"><img src="images/airbnb-logo.webp" alt="Airbnb"></div>
        <div class="logo-item"><img src="images/amazon-logo.webp" alt="Amazon"></div>
        <div class="logo-item"><img src="images/disney-logo.webp" alt="Disney"></div>
        <div class="logo-item"><img src="images/google-logo.webp" alt="Google"></div>
        <div class="logo-item"><img src="images/meta-logo.webp" alt="Meta"></div>
        <div class="logo-item"><img src="images/microsoft-logo.webp" alt="Microsoft"></div>
        <div class="logo-item"><img src="images/spotify-logo.webp" alt="Spotify"></div>
        <div class="logo-item"><img src="images/stripe-logo.webp" alt="Stripe"></div>
      </div>
    </div>
  </div>
  <p class="hero-footer">
    <span>© 2026 CoFi Labs Inc. · Toronto, Canada</span>
    <a href="https://form.typeform.com/to/HKG5aUgq">Contact</a>
  </p>
</section>

<script>
  // Shooting stars disabled

  // Moon / light mode toggle
  const moon = document.querySelector('.moon');
  const heroEl = document.querySelector('.hero');
  moon.addEventListener('click', () => {
    moon.classList.toggle('is-sun');
    heroEl.classList.toggle('light-mode');
  });


  const container = document.getElementById('stars');
  for (let i = 0; i < 180; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width: ${size}px; height: ${size}px;
      top: ${Math.random() * 100}%;
      left: ${Math.random() * 100}%;
      --d: ${(Math.random() * 4 + 2).toFixed(1)}s;
      --delay: -${(Math.random() * 6).toFixed(1)}s;
      --op-min: ${(Math.random() * 0.2 + 0.05).toFixed(2)};
      --op-max: ${(Math.random() * 0.5 + 0.5).toFixed(2)};
    `;
    container.appendChild(s);
  }
</script>
</body>
</html>
